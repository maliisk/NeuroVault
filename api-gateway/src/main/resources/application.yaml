server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: identity-service
              uri: lb://IDENTITY-SERVICE
              predicates:
                - Path=/auth/**

            - id: ingestion-service
              uri: lb://INGESTION-SERVICE
              predicates:
                - Path=/api/v1/data/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/