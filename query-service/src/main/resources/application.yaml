server:
  port: 8084

spring:
  application:
    name: query-service

  datasource:
    url: jdbc:postgresql://localhost:5433/neurovault_db
    username: root
    password: rootpassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/